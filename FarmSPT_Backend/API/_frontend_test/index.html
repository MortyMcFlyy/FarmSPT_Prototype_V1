<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmSPT - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 300px; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; font-size: 1.5rem; }
        input { width: 100%; padding: 0.7rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
        button { width: 100%; padding: 0.8rem; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button:hover { background: #45a049; }
        .error { color: red; font-size: 0.85rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1> FarmSPT</h1>
        <input id="username" type="text" placeholder="Benutzername" />
        <input id="password" type="password" placeholder="Passwort" />
        <button onclick="login()">Login</button>
        <div id="error" class="error"></div>
    </div>

    <script>
        // CSRF-Token aus Cookie lesen
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (!username || !password) {
                errorDiv.textContent = 'Bitte beide Felder ausfüllen';
                return;
            }

            try {
                // Schritt 1: CSRF-Cookie holen (GET auf Login-Seite)
                await fetch('/api-auth/login/', {
                    method: 'GET',
                    credentials: 'include'
                });

                // Schritt 2: Token aus Cookie auslesen
                const csrfToken = getCookie('csrftoken');
                if (!csrfToken) {
                    errorDiv.textContent = 'Sicherheits-Token fehlt';
                    return;
                }

                // Schritt 3: Login mit Token im Header
                const response = await fetch('/api-auth/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': csrfToken
                    },
                    credentials: 'include',
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });

                // Schritt 4: Erfolgsprüfung
                if (response.ok) {
                    localStorage.setItem('logged_in', 'true');
                    window.location.href = '/app/dashboard.html';
                } else {
                    errorDiv.textContent = 'Login fehlgeschlagen - falsche Daten?';
                }
            } catch (e) {
                errorDiv.textContent = 'Fehler beim Login';
                console.error(e);
            }
        }

        document.querySelector('input[type=password]').addEventListener('keypress', e => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
