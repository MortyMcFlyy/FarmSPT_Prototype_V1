# Consumer Connector Settings
edc.connector.name=FarmSPT-Consumer
edc.participant.id=urn:uuid:consumer-001

# Management API
web.http.management.port=8080
web.http.management.path=/api/mgmt

# DSP Protocol
web.http.protocol.port=8081
web.http.protocol.path=/api/dsp

# Data Plane
edc.dataplane.url=http://consumer-dataplane:8080

# Provider Endpoint (für DSP Kommunikation)
edc.remote.connector.url=http://provider-controlplane:8081/api/dsp

# Database
edc.datasource.default.url=jdbc:h2:mem:consumer-db
edc.datasource.default.user=sa
edc.datasource.default.password=

# Security
edc.api.auth.key=test-api-key
edc.vault.memory.secret=test-secret