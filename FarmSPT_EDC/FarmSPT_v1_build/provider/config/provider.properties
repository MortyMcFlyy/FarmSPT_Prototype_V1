# Provider Connector Settings
edc.connector.name=FarmSPT-Provider
edc.participant.id=urn:uuid:provider-001

# Management API (für Assets/Policies)
web.http.management.port=8080
web.http.management.path=/api/mgmt

# DSP Protocol
web.http.protocol.port=8081
web.http.protocol.path=/api/dsp

# Data Plane
edc.dataplane.url=http://provider-dataplane:8080

# In-Memory Database (vereinfacht)
edc.datasource.default.url=jdbc:h2:mem:provider-db
edc.datasource.default.user=sa
edc.datasource.default.password=

# Security (simplified for demo)
edc.api.auth.key=test-api-key
edc.vault.memory.secret=test-secret