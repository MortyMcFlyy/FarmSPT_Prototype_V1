version: '3.8'

services:
  # ===== PROVIDER CONNECTOR =====
  provider-controlplane:
    image: eclipse-edc/edc-runtime:latest
    container_name: provider-cp
    ports:
      - "9191:8080"    # Management API
      - "9192:8081"    # DSP Protocol
    environment:
      - EDC_CONNECTOR_NAME=Provider
      - WEB_HTTP_PORT=8080
      - WEB_HTTP_PATH=/api
      - WEB_HTTP_PROTOCOL_PORT=8081
      - WEB_HTTP_PROTOCOL_PATH=/api/dsp
      - WEB_HTTP_MANAGEMENT_PORT=8080
      - WEB_HTTP_MANAGEMENT_PATH=/api/mgmt
      - EDC_DATASOURCE_DEFAULT_URL=jdbc:h2:mem:provider
      - EDC_DATASOURCE_DEFAULT_USER=sa
      - EDC_DATASOURCE_DEFAULT_PASSWORD=
      - EDC_API_AUTH_KEY=test-api-key
    volumes:
      - ./provider/config/provider.properties:/etc/edc/provider.properties
      - ./provider/data:/data
    networks:
      - edc-network

  provider-dataplane:
    image: eclipse-edc/edc-runtime:latest
    container_name: provider-dp
    ports:
      - "9291:8080"    # Public endpoint
    environment:
      - EDC_CONNECTOR_NAME=Provider-DataPlane
      - WEB_HTTP_PORT=8080
      - WEB_HTTP_PATH=/api
      - EDC_DATASOURCE_DEFAULT_URL=jdbc:h2:mem:provider-dp
      - EDC_DATASOURCE_DEFAULT_USER=sa
      - EDC_DATASOURCE_DEFAULT_PASSWORD=
    volumes:
      - ./provider/data:/data
    depends_on:
      - provider-controlplane
    networks:
      - edc-network

  # ===== CONSUMER CONNECTOR =====
  consumer-controlplane:
    image: eclipse-edc/edc-runtime:latest
    container_name: consumer-cp
    ports:
      - "9201:8080"    # Management API
      - "9202:8081"    # DSP Protocol
    environment:
      - EDC_CONNECTOR_NAME=Consumer
      - WEB_HTTP_PORT=8080
      - WEB_HTTP_PATH=/api
      - WEB_HTTP_PROTOCOL_PORT=8081
      - WEB_HTTP_PROTOCOL_PATH=/api/dsp
      - WEB_HTTP_MANAGEMENT_PORT=8080
      - WEB_HTTP_MANAGEMENT_PATH=/api/mgmt
      - EDC_DATASOURCE_DEFAULT_URL=jdbc:h2:mem:consumer
      - EDC_DATASOURCE_DEFAULT_USER=sa
      - EDC_DATASOURCE_DEFAULT_PASSWORD=
      - EDC_API_AUTH_KEY=test-api-key
    volumes:
      - ./consumer/config/consumer.properties:/etc/edc/consumer.properties
    networks:
      - edc-network

  consumer-dataplane:
    image: eclipse-edc/edc-runtime:latest
    container_name: consumer-dp
    ports:
      - "9301:8080"    # Public endpoint
    environment:
      - EDC_CONNECTOR_NAME=Consumer-DataPlane
      - WEB_HTTP_PORT=8080
      - WEB_HTTP_PATH=/api
      - EDC_DATASOURCE_DEFAULT_URL=jdbc:h2:mem:consumer-dp
      - EDC_DATASOURCE_DEFAULT_USER=sa
      - EDC_DATASOURCE_DEFAULT_PASSWORD=
    networks:
      - edc-network

networks:
  edc-network:
    driver: bridge